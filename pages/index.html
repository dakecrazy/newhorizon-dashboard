<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8" />
 <title>newhorizon</title>
 <style>
 @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 }

 body {
 background: #000;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 min-height: 100vh;
 gap: 30px;
 font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
 color: white;
 padding: 40px 20px;
 }

 .logo {
 display: flex;
 align-items: center;
 font-weight: 700;
 font-size: 140px;
 letter-spacing: -4px;
 text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
 }

 .logo svg {
 width: 120px;
 height: 120px;
 margin: 0 5px;
 filter: drop-shadow(0 0 20px rgba(100, 100, 255, 0.3));
 transition: transform 0.3s ease;
 }

 .logo svg:hover {
 transform: scale(1.05);
 }

 .actions {
 display: flex;
 flex-direction: column;
 align-items: center;
 gap: 12px;
 }

 #login {
 padding: 14px 32px;
 font-size: 16px;
 font-weight: 600;
 border: 1px solid rgba(255, 255, 255, 0.3);
 background: rgba(255, 255, 255, 0.05);
 color: #fff;
 cursor: pointer;
 border-radius: 8px;
 transition: all 0.3s ease;
 backdrop-filter: blur(10px);
 }

 #login:hover {
 background: rgba(255, 255, 255, 0.15);
 border-color: rgba(255, 255, 255, 0.6);
 box-shadow: 0 0 30px rgba(100, 100, 255, 0.2);
 transform: translateY(-2px);
 }

 #login:active {
 transform: translateY(0);
 }

 #status {
 color: rgba(255, 255, 255, 0.6);
 margin: 0;
 font-size: 13px;
 font-weight: 400;
 }

 #chart {
 max-width: 900px;
 width: 90vw;
 height: 320px;
 border-radius: 12px;
 overflow: hidden;
 }

 #analysis {
 color: rgba(255, 255, 255, 0.8);
 width: 90vw;
 max-width: 900px;
 white-space: pre-wrap;
 font-family: 'Monaco', 'Menlo', monospace;
 font-size: 13px;
 line-height: 1.6;
 }

 /* Footer Section */
 .footer {
 display: flex;
 flex-direction: column;
 align-items: center;
 gap: 16px;
 margin-top: 20px;
 padding-top: 30px;
 border-top: 1px solid rgba(255, 255, 255, 0.1);
 width: 90vw;
 max-width: 900px;
 }

 .powered-by {
 font-size: 14px;
 color: rgba(255, 255, 255, 0.5);
 font-weight: 500;
 }

 .powered-by span {
 color: rgba(255, 255, 255, 0.8);
 font-weight: 600;
 }

 .contact-section {
 display: flex;
 flex-direction: column;
 align-items: center;
 gap: 10px;
 }

 .contact-item {
 display: flex;
 align-items: center;
 gap: 8px;
 font-size: 14px;
 color: rgba(255, 255, 255, 0.6);
 }

 .contact-item a {
 color: rgba(100, 150, 255, 0.9);
 text-decoration: none;
 transition: color 0.3s ease;
 }

 .contact-item a:hover {
 color: rgba(150, 180, 255, 1);
 text-decoration: underline;
 }

 .social-links {
 display: flex;
 gap: 20px;
 margin-top: 10px;
 }

 .social-link {
 display: flex;
 align-items: center;
 gap: 6px;
 padding: 8px 16px;
 border: 1px solid rgba(255, 255, 255, 0.2);
 border-radius: 20px;
 color: rgba(255, 255, 255, 0.7);
 text-decoration: none;
 font-size: 13px;
 font-weight: 500;
 transition: all 0.3s ease;
 background: rgba(255, 255, 255, 0.03);
 }

 .social-link:hover {
 background: rgba(255, 255, 255, 0.1);
 border-color: rgba(255, 255, 255, 0.4);
 color: white;
 transform: translateY(-2px);
 }

 .social-link svg {
 width: 16px;
 height: 16px;
 fill: currentColor;
 }

 .market-bar {
   position: fixed;
   top: 0;
   left: 0;
   width: 100%;
   background: rgba(10, 15, 30, 0.9);
   border-bottom: 1px solid rgba(255,255,255,0.12);
   color: #fff;
   z-index: 999;
   display: flex;
   align-items: center;
   flex-wrap: wrap;
   gap: 16px;
   padding: 10px 24px;
   font-size: 13px;
   box-shadow: 0 6px 20px rgba(0,0,0,0.35);
 }

 .market-item {
   font-weight: 600;
   white-space: nowrap;
 }

 body {
   padding-top: 70px;
 }
 </style>
</head>
